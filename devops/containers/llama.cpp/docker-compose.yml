services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server

    ports:
      - "8080:8080"

    volumes:
      - ~/Models:/models

    command:
      - -m
      - ${MODEL}
      - --host
      - 0.0.0.0
      - --mlock
      - -t
      - "2"
      - -c
      - "2048"
      - -b
      - "256"

    restart: unless-stopped
